<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add sport</title>
</head>
<body>

<h2>Add Sport</h2>

<form th:action="@{/savesport}" th:object="${sport}" method="post">

<label>Date</label>
<input type="text" th:field="*{date}" />

<label>Time (min)</label>
<input type="number" th:field="*{time}" />

<label>Distance (km)</label>
<input type="number" th:field="*{distance}" />

<label>Category</label>
<select th:field="*{category}" th:object="${sport}">
<option th:each="cat : ${categories}"
        th:value="${cat.categoryid}"
        th:text="${cat.name}">
</option>
</select>

<input type="hidden" th:field="*{user.id}" />

<button type="submit">Save</button>

</form>

</body>
</html>
