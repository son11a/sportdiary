<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
</head>
<body>

<table>
<tr>
<th>Username</th>
<th>Email</th>
<th>Sports</th>
</tr>

<tr th:each="user : ${users}">
<td th:text="${user.username}"></td>
<td th:text="${user.email}"></td>

<td>
<a th:href="@{/sportlist/{id}(id=${user.id})}">View Sportlist</a>
</td>


</tr>

</table>


</body>
</html>
